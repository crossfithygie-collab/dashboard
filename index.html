<title>Hygie Dashboard</title>
<style>
:root{
 --bg:#f0eeea;--sur:#fff;--s2:#e8e6e2;
 --t:#141412;--t2:#5e5e56;--t3:#9e9e96;
 --bd:rgba(0,0,0,.06);--bd2:rgba(0,0,0,.12);
 --green:#1a9e72;--bgreen:#dff4ec;--tgreen:#0a4f38;
 --red:#d44e28;--bred:#faeae4;--tred:#6e2810;
 --amber:#b87214;--bamber:#faebd6;--tamber:#5e3a08;
 --blue:#1a5fa8;--bblue:#e4f0fc;--tblue:#0b3d7a;
 --r:16px;--rs:10px;
}
@media(prefers-color-scheme:dark){:root{
 --bg:#0c0c0b;--sur:#161614;--s2:#1e1e1c;
 --t:#eeeee8;--t2:#8e8e84;--t3:#5e5e56;
 --bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.12);
 --bgreen:#0a4f38;--tgreen:#9de0c6;
 --bred:#6e2810;--tred:#f4c0ac;
 --bamber:#5e3a08;--tamber:#f8c070;
 --bblue:#0b3d7a;--tblue:#b0d2f4;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}

/* ── PAGE PRINCIPALE ── */
.main{min-height:100vh;display:flex;flex-direction:column;padding:env(safe-area-inset-top,0) 0 3rem}

/* Header */
.hdr{padding:12px 16px 10px;border-bottom:.5px solid var(--bd)}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.hdr-brand{display:flex;flex-direction:column;gap:2px}
.hdr-title{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--t)}
.hdr-date{font-size:12px;color:var(--t3)}

/* Boutons import côte à côte */
.imp-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.imp{display:flex;flex-direction:column;align-items:flex-start;gap:2px;
 padding:10px 12px;border-radius:var(--rs);border:.5px solid var(--bd2);
 background:var(--sur);color:var(--t2);cursor:pointer;
 transition:all .15s;line-height:1.3;width:100%}
.imp:hover{background:var(--s2)}
.imp-icon{font-size:16px;margin-bottom:2px}
.imp-name{font-size:12px;font-weight:600;color:var(--t)}
.imp-status{font-size:10px;color:var(--t3)}
.imp.ok-green{border-color:var(--green);background:var(--bgreen)}
.imp.ok-green .imp-name{color:var(--tgreen)}
.imp.ok-green .imp-status{color:var(--tgreen);opacity:.7}
.imp.ok-blue{border-color:var(--blue);background:var(--bblue)}
.imp.ok-blue .imp-name{color:var(--tblue)}
.imp.ok-blue .imp-status{color:var(--tblue);opacity:.7}
.imp.ok-purple{border-color:#534ab7;background:#eeedfe}
.imp.ok-purple .imp-name{color:#26215c}
.imp.ok-purple .imp-status{color:#534ab7;opacity:.8}

/* Sections */
.sec-wrap{padding:0 14px}
.sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin:14px 0 7px}
.stack{display:flex;flex-direction:column;gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Tuiles KPI */
.kc{border-radius:18px;padding:20px 18px;cursor:pointer;position:relative;
 overflow:hidden;transition:transform .12s;
 user-select:none;-webkit-user-select:none}
.kc:active{transform:scale(.97)}
.kc.green{background:linear-gradient(135deg,#1db87f 0%,#158a5e 100%)}
.kc.red{background:linear-gradient(135deg,#e05a32 0%,#b83d1e 100%)}
.kc.amber{background:linear-gradient(135deg,#d4861a 0%,#a8650e 100%)}
.kc.blue{background:linear-gradient(135deg,#2270c4 0%,#1450a0 100%)}
.kc .lbl{font-size:11px;font-weight:600;color:rgba(255,255,255,.65);
 margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase}
.kc .num{font-size:52px;font-weight:800;letter-spacing:-.04em;line-height:1;color:#fff}
.kc .num.sm{font-size:34px;letter-spacing:-.02em}
.kc .sub{font-size:10px;color:rgba(255,255,255,.55);margin-top:3px;line-height:1.3}
.kc .arr{position:absolute;right:10px;top:10px;font-size:13px;color:rgba(255,255,255,.3)}
.kc.wide{grid-column:1/-1}

.det{display:none;position:fixed;inset:0;z-index:100;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch}
.det.on{display:block}
.det-hdr{position:sticky;top:0;z-index:10;background:var(--bg);padding:env(safe-area-inset-top,14px) 16px 0;border-bottom:.5px solid var(--bd2)}
.det-inner{display:flex;align-items:center;gap:11px;padding:9px 0 11px}
.back{width:34px;height:34px;border-radius:50%;background:var(--s2);border:.5px solid var(--bd2);
 display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;
 flex-shrink:0;color:var(--t);line-height:1}
.det-ttl{font-size:16px;font-weight:700;flex:1}
.dbadge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap}
.dbadge.green{background:var(--bgreen);color:var(--tgreen)}
.dbadge.red{background:var(--bred);color:var(--tred)}
.dbadge.amber{background:var(--bamber);color:var(--tamber)}
.dbadge.blue{background:var(--bblue);color:var(--tblue)}
.det-body{padding:14px 16px 3rem}

.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.sc{background:var(--s2);border-radius:var(--rs);padding:11px 12px}
.sc-lbl{font-size:11px;color:var(--t2);margin-bottom:3px}
.sc-val{font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1}
.sc-sub{font-size:11px;color:var(--t3);margin-top:4px}

.cc{background:var(--sur);border:.5px solid var(--bd);border-radius:var(--r);padding:13px 14px;margin-bottom:10px}
.cc-ttl{font-size:13px;font-weight:700;margin-bottom:2px}
.cc-sub{font-size:11px;color:var(--t2);margin-bottom:10px}

.blist{display:flex;flex-direction:column;gap:8px}
.bi{display:flex;flex-direction:column;gap:3px}
.bt{display:flex;justify-content:space-between;font-size:12px}
.bbg{height:6px;background:var(--s2);border-radius:3px;overflow:hidden}
.bfill{height:100%;border-radius:3px}

/* Sélecteur de mois */
.mois-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.mois-pill{padding:5px 12px;border-radius:20px;border:.5px solid var(--bd2);
 background:transparent;color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.mois-pill.on{background:var(--blue);color:#fff;border-color:var(--blue)}

.mc{background:var(--sur);border:.5px solid var(--bd);border-radius:var(--r);padding:13px 15px;margin-bottom:8px}
.mc-top{display:flex;align-items:center;gap:11px;margin-bottom:9px}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.mc-name{font-size:14px;font-weight:700}
.mc-abo{font-size:11px;color:var(--t2);margin-top:2px}
.mc-tag{margin-left:auto;flex-shrink:0;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.tag-r{background:var(--bred);color:var(--tred)}
.tag-a{background:var(--bamber);color:var(--tamber)}
.tag-g{background:var(--bgreen);color:var(--tgreen)}
.tag-b{background:var(--bblue);color:var(--tblue)}
.div{height:.5px;background:var(--bd);margin:8px 0}
.rows{display:flex;flex-direction:column;gap:5px}
.row{display:flex;justify-content:space-between;align-items:center}
.rl{font-size:12px;color:var(--t3)}
.rv{font-size:12px;font-weight:600;color:var(--t);text-align:right;max-width:60%;word-break:break-all}
.btns{display:flex;gap:8px;margin-top:10px}
.btn{flex:1;padding:9px;border-radius:var(--rs);border:.5px solid var(--bd2);background:transparent;font-size:13px;font-weight:600;color:var(--t);cursor:pointer;text-align:center;text-decoration:none;display:block}
.btn.p{background:var(--t);color:var(--bg);border-color:var(--t)}
.gh{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin:14px 0 8px;padding-left:2px}
.gh:first-child{margin-top:0}
canvas{display:block}
</style>
</head>
<body>

<div class="main" id="main">

 <div class="hdr">
  <div class="hdr-top">
   <div class="hdr-brand">
    <div class="hdr-title">CrossFit Hygie</div>
    <div class="hdr-date" id="hdr-date"></div>
   </div>
   <button onclick="ouvrirTiroir()" style="width:34px;height:34px;border-radius:50%;background:var(--s2);border:.5px solid var(--bd2);font-size:20px;cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1">&#8943;</button>
  </div>
  <input type="file" id="fi-resa" accept=".xlsx,.xls" style="display:none">
  <input type="file" id="fi-hib" accept=".csv" style="display:none">
  <input type="file" id="fi-cours" accept=".xlsx,.xls" style="display:none">
  <input type="file" id="fi-ghosts" accept=".xlsx,.xls" style="display:none">
 </div>

 <div class="sec-wrap">
 <div class="sec"> Membres</div>
 <div class="grid2">
 <div class="kc green" onclick="ouvrirDetail('actifs')">
 <div class="lbl"> Abonnés actifs</div>
 <div class="num" id="n-actifs"></div>
 <div class="sub" id="s-actifs"></div>
 <div class="arr"></div>
 </div>
 <div class="kc red" id="card-30j" onclick="ouvrirDetail('30j')">
 <div class="lbl">Fins engagement</div>
 <div class="num" id="n-30j"></div>
 <div class="sub" id="s-30j">dans 30 jours</div>
 <div class="arr"></div>
 </div>
 <div class="kc wide" style="background:linear-gradient(135deg,#534ab7 0%,#3a34a0 100%)" onclick="ouvrirDetail('rempli')">
 <div class="lbl"> Remplissage</div>
 <div class="num" id="n-rempli"></div>
 <div class="sub" id="s-rempli"></div>
 <div class="arr"></div>
 </div>
 </div>

 <div class="sec"> Chiffre d'affaires</div>
 <div class="stack">
 <div class="kc blue" onclick="ouvrirDetail('ca')">
 <div class="lbl" id="lbl-ca"> Boutique</div>
 <div class="num sm" id="n-ca"></div>
 <div class="sub" id="s-ca"></div>
 <div class="arr"></div>
 </div>
 <div class="kc amber wide" onclick="ouvrirDetail('prelev')">
  <div class="lbl" id="lbl-prelev"> Prélèvement</div>
  <div class="num sm" id="n-prelev"></div>
  <div class="sub" id="s-prelev"></div>
  <div class="arr"></div>
 </div>
 </div>
 </div>

</div>

<!-- TIROIR -->
<div id="tiroir-overlay" onclick="fermerTiroir()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200"></div>
<div id="tiroir" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:201;background:var(--bg);border-radius:16px 16px 0 0;padding-bottom:env(safe-area-inset-bottom,12px);box-shadow:0 -2px 20px rgba(0,0,0,.1);transform:translateY(100%);transition:transform .3s cubic-bezier(.16,1,.3,1)">
  <div style="width:32px;height:3px;border-radius:2px;background:var(--bd2);margin:10px auto 12px"></div>
  <div style="padding:0 14px 14px;display:flex;flex-direction:column;gap:10px">
    <div>
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:6px">Importer</div>
      <div style="background:var(--sur);border-radius:12px;border:.5px solid var(--bd);overflow:hidden">
        <label for="fi-resa" id="lbl-resa" onclick="fermerTiroir()" style="display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;border-bottom:.5px solid var(--bd)">
          <div style="width:28px;height:28px;border-radius:7px;background:var(--bgreen);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--tgreen)">RW</div>
          <div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--t)" id="txt-resa-name">Resawod</div><div style="font-size:11px;color:var(--t3)" id="txt-resa-status">.xlsx — abonnés</div></div>
          <div style="color:var(--t3)">›</div>
        </label>
        <label for="fi-hib" id="lbl-hib" onclick="fermerTiroir()" style="display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;border-bottom:.5px solid var(--bd)">
          <div style="width:28px;height:28px;border-radius:7px;background:var(--bblue);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--tblue)">HB</div>
          <div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--t)" id="txt-hib-name">Hiboutik</div><div style="font-size:11px;color:var(--t3)" id="txt-hib-status">.csv — ventes</div></div>
          <div style="color:var(--t3)">›</div>
        </label>
        <label for="fi-cours" id="lbl-cours" onclick="fermerTiroir()" style="display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;border-bottom:.5px solid var(--bd)">
          <div style="width:28px;height:28px;border-radius:7px;background:#eeedfe;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#3a34a0">TR</div>
          <div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--t)" id="txt-cours-name">Taux de remplissage</div><div style="font-size:11px;color:var(--t3)" id="txt-cours-status">.xlsx — cours</div></div>
          <div style="color:var(--t3)">›</div>
        </label>
        <label for="fi-ghosts" id="lbl-ghosts" onclick="fermerTiroir()" style="display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer">
          <div style="width:28px;height:28px;border-radius:7px;background:#222;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#aaa">GH</div>
          <div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--t)" id="txt-ghosts-name">Ghosts</div><div style="font-size:11px;color:var(--t3)" id="txt-ghosts-status">.xlsx — absents +3 semaines</div></div>
          <div style="color:var(--t3)">›</div>
        </label>
      </div>
    </div>
    <div>
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:6px">Sync</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
        <button onclick="fermerTiroir();setTimeout(exporterSync,220)" style="padding:9px;border-radius:10px;background:var(--sur);border:.5px solid var(--bd);font-size:13px;font-weight:600;color:var(--t);cursor:pointer">&#8679; Exporter</button>
        <button onclick="fermerTiroir();setTimeout(importerSync,220)" style="padding:9px;border-radius:10px;background:var(--t);border:none;font-size:13px;font-weight:600;color:var(--bg);cursor:pointer">&#8681; Importer</button>
      </div>
    </div>
  </div>
</div>

 </div></div>

<script>
var membres = [], fin30 = [], prelevData = [], hibRows = [], ghostRows = [];
var chartCAinst = null;
var chartActifsInst = null;
var chartRempliInst = null;
var chartRempliEvol = null;
var chartRetentionInst = null;
var chartNouveauxInst = null;
var moisActif = null;
var rempliRows = [];

var AV_BG = ['#b0d2f4','#9de0c6','#f8c070','#f4c0ac','#ccc8f6','#f4b8d0'];
var AV_TX = ['#0b3d7a','#0a4f38','#5e3a08','#6e2810','#26215c','#5e1830'];
var PAY_COL = {CB:'#1a5fa8',ESP:'#1a9e72',CRED:'#b87214',DIV:'#534ab7',CHQ:'#d44e28'};

function fmtE(n){ return new Intl.NumberFormat('fr-FR',{minimumFractionDigits:0,maximumFractionDigits:0}).format(Math.round(n))+'€'; }
function fmtN(n){ return Math.round(n).toLocaleString('fr-FR'); }
function capMot(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1).toLowerCase() : ''; }
function capNom(s){ return (s||'').split(/\s+/).map(capMot).join(' '); }
function ini(p,n){ return ((p||'')[0]||'').toUpperCase()+((n||'')[0]||'').toUpperCase(); }

function parseDate(v){
 if(!v || v==='Illimité' || v==='Durée indéterminée') return null;
 var s = String(v).trim();
 var m1 = s.match(/^(\d{2})-(\d{2})-(\d{4})/);
 if(m1) return new Date(parseInt(m1[3]), parseInt(m1[2])-1, parseInt(m1[1]));
 var m2 = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
 if(m2) return new Date(parseInt(m2[1]), parseInt(m2[2])-1, parseInt(m2[3]));
 return null;
}
function fmtDate(v){
 var d = parseDate(v); if(!d) return v||'';
 return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
}
function fmtDateCourt(v){
 var d = parseDate(v); if(!d) return v||'';
 return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
}

// ─── PARSE XLSX ───
function parseXLSX(buffer){
 var wb = XLSX.read(buffer,{type:'array',raw:true});
 var ws = wb.Sheets[wb.SheetNames[0]];
 var raw = XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:true});

 // Trouver la ligne contenant 'Statut' (gère fichiers avec ou sans ligne titre)
 var hi=-1;
 for(var i=0;i<Math.min(raw.length,6);i++){
 for(var j=0;j<raw[i].length;j++){
 if(String(raw[i][j]||'').trim()==='Statut'){hi=i;break;}
 }
 if(hi>=0) break;
 }
 if(hi<0){ alert('Colonne Statut introuvable vérifie le fichier ResaWod.'); return []; }

 var hdrs=raw[hi], idx={};
 for(var k=0;k<hdrs.length;k++){
 var h=String(hdrs[k]||'').trim();
 if(h) idx[h]=k;
 }

 var COLS=['Prénom','Nom','Portable','Email','Abonnement','Profil','Prix','Paiement','Statut','Acheté le',"Date d'engagement",'Expiré le','Durée','Méthode de paiement par défaut'];
 var data=[];
 for(var r=hi+1;r<raw.length;r++){
 var row=raw[r];
 if(!row||!row.length) continue;
 var statutIdx=idx['Statut'];
 if(statutIdx===undefined) continue;
 var statut=String(row[statutIdx]||'').trim();
 if(!statut) continue;
 var obj={};
 COLS.forEach(function(col){
 var ci=idx[col];
 if(ci===undefined){obj[col]='';return;}
 var v=row[ci];
 if(v===null||v===undefined){obj[col]='';return;}
 if(typeof v==='number'&&v>40000&&v<60000){
 var d=new Date(Math.round((v-25569)*86400*1000));
 obj[col]=String(d.getDate()).padStart(2,'0')+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+d.getFullYear();
 return;
 }
 obj[col]=String(v).trim();
 });
 data.push(obj);
 }
 return data;
}

// ─── PARSE XLSX COURS ───
function parseXLSXCours(buffer){
 var wb=XLSX.read(buffer,{type:'array',raw:true});
 var ws=wb.Sheets[wb.SheetNames[0]];
 var raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:true});
 // Trouver headers
 var hi=-1;
 for(var i=0;i<Math.min(raw.length,3);i++){
 if(raw[i].some(function(c){return String(c||'').trim()==='Date';})){hi=i;break;}
 }
 if(hi<0) return [];
 var hdrs=raw[hi], idx={};
 for(var k=0;k<hdrs.length;k++) idx[String(hdrs[k]||'').trim()]=k;

 // Détecter le format :
 // Format A (ancien) : Date | Date début | Date fin | Nom | Participants | Nombre de participants | Taux | Liste attente | Coach
 // Format B (nouveau) : Date | Nom | Participants | Nombre de participants | Taux | Liste attente | Statut | Catégories
 var colNom = idx['Nom'] !== undefined ? idx['Nom'] : null;
 var colParticipants = idx['Participants'] !== undefined ? idx['Participants'] : null;
 var colNbParticipants = idx['Nombre de participants'] !== undefined ? idx['Nombre de participants'] : null;
 var colStatut = idx['Statut'] !== undefined ? idx['Statut'] : null;
 if(colNom===null || colParticipants===null || colNbParticipants===null) return [];

 var EXCLUS=['Annulé','Stage','annulé'];
 var data=[];
 for(var r=hi+1;r<raw.length;r++){
 var row=raw[r];
 if(!row||!row[idx['Date']]) continue;
 // Exclure statut Annulé (format B)
 if(colStatut!==null && String(row[colStatut]||'').trim()==='Annulé') continue;
 var nom=String(row[colNom]||'').trim();
 if(!nom) continue;
 if(EXCLUS.some(function(x){return nom.indexOf(x)>=0;})) continue;
 // Convertir date
 var dateVal=row[idx['Date']];
 var dateStr='';
 if(typeof dateVal==='number'&&dateVal>40000){
 var d=new Date(Math.round((dateVal-25569)*86400*1000));
 dateStr=String(d.getDate()).padStart(2,'0')+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+d.getFullYear();
 } else { dateStr=String(dateVal).trim(); }
 var inscrits=parseInt(row[colParticipants]||0)||0;
 var capa=parseInt(row[colNbParticipants]||0)||0;
 if(!capa) continue;
 data.push({date:dateStr,nom:nom,inscrits:inscrits,capa:capa});
 }
 return data;
}

// ─── PROCESS COURS ───
function processCours(rows){
 // Fusion cumulative intelligente :
 // - Mois courant : toujours remplacé intégralement
 // - Mois passés : remplacés intégralement par les nouvelles données du fichier
 // (si un nouveau cours apparaît dans l'historique, il est pris en compte)
 // - Mois absents du nouveau fichier : conservés depuis le cache
 var now=new Date();
 var moisCourant=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');

 var cumul={};
 try{ var ex=localStorage.getItem('hygie_cours_cumul'); if(ex) cumul=JSON.parse(ex); }catch(e){}

 // Indexer les nouvelles données par mois
 var rowsParMois={};
 rows.forEach(function(r){
 var p=r.date.split('-');
 if(p.length!==3) return;
 var mois=p[2]+'-'+p[1];
 if(!rowsParMois[mois]) rowsParMois[mois]=[];
 rowsParMois[mois].push(r);
 });

 // Pour chaque mois présent dans le nouveau fichier : remplacer complètement
 // (capte les nouveaux cours, corrections, etc.)
 // Pour les mois absents du fichier : conserver le cache
 Object.keys(rowsParMois).forEach(function(mois){
 cumul[mois]=rowsParMois[mois];
 });

 try{ localStorage.setItem('hygie_cours_cumul', JSON.stringify(cumul)); }catch(e){}

 // Aplatir pour rempliRows
 rempliRows=[];
 Object.keys(cumul).forEach(function(m){ rempliRows=rempliRows.concat(cumul[m]); });

 updateTuileCours();
 renderRempli();
}

function updateTuileCours(){
 var now=new Date();
 var moisCourant=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
 // Chercher le mois le plus récent disponible
 var moisDispo={};
 rempliRows.forEach(function(r){
 var parts=r.date.split('-');
 if(parts.length===3) moisDispo[parts[2]+'-'+parts[1]]=true;
 });
 var moisKeys=Object.keys(moisDispo).sort();
 var moisRef=moisKeys.indexOf(moisCourant)>=0?moisCourant:moisKeys[moisKeys.length-1];
 if(!moisRef) return;
 var moisRows=rempliRows.filter(function(r){
 var p=r.date.split('-');
 return p.length===3&&(p[2]+'-'+p[1])===moisRef;
 });
 // Exclure Free Hygie du calcul du taux global
 var moisRowsCalc=moisRows.filter(function(r){ return r.nom.indexOf('Free')<0; });
 var inscrits=moisRowsCalc.reduce(function(a,r){return a+r.inscrits;},0);
 var capa=moisRowsCalc.reduce(function(a,r){return a+r.capa;},0);
 var taux=capa?inscrits/capa:0;
 var p=moisRef.split('-');
 var nomMois=new Date(parseInt(p[0]),parseInt(p[1])-1,1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
 document.getElementById('n-rempli').textContent=Math.round(taux*100)+'%';
 document.getElementById('s-rempli').textContent=inscrits+' inscrits / '+capa+' places · '+nomMois;
 document.getElementById('b-rempli').textContent=Math.round(taux*100)+'%';
}

// ─── PARSE XLSX GHOSTS ───
function parseXLSXGhosts(buffer){
  var wb=XLSX.read(buffer,{type:'array',raw:true});
  var ws=wb.Sheets[wb.SheetNames[0]];
  var raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:true});
  var hi=-1;
  for(var i=0;i<Math.min(raw.length,3);i++){
    if(raw[i].some(function(c){return String(c||'').trim()==='Nom entier';})){hi=i;break;}
  }
  if(hi<0) return [];
  var hdrs=raw[hi], idx={};
  for(var k=0;k<hdrs.length;k++) idx[String(hdrs[k]||'').trim()]=k;
  var data=[];
  for(var r=hi+1;r<raw.length;r++){
    var row=raw[r];
    if(!row||!row[idx['Nom entier']]) continue;
    var creeRaw=row[idx['Créé le...']];
    var creeStr='';
    if(typeof creeRaw==='number'&&creeRaw>40000){
      var d=new Date(Math.round((creeRaw-25569)*86400*1000));
      creeStr=d.toLocaleDateString('fr-FR');
    } else { creeStr=String(creeRaw||'').split(' ')[0]; }
    data.push({
      nom:String(row[idx['Nom entier']]||'').trim(),
      tel:String(row[idx['Portable']]||'').trim(),
      email:String(row[idx['Email']]||'').trim(),
      abonnement:String(row[idx['Abonnements actifs des utilisateurs']]||'—').trim(),
      statut:String(row[idx['Statut']]||'').trim(),
      cree:creeStr,
      tag:String(row[idx['Tag']]||'').trim(),
    });
  }
  return data;
}

// ─── PARSE CSV ───
function parseCSV(text){
 var lines=text.split('\n').filter(function(l){return l.trim();});
 var sep=lines[0].split(';').length>lines[0].split(',').length?';':',';
 function unq(s){return s.replace(/^"|"$/g,'').trim();}
 var headers=lines[0].split(sep).map(unq);
 var rows=[];
 for(var i=1;i<lines.length;i++){
 var vals=lines[i].split(sep).map(unq);
 if(vals.length<3) continue;
 var row={};
 headers.forEach(function(h,j){row[h]=vals[j]||'';});
 if(row['Date']&&row['CA TTC']) rows.push(row);
 }
 return rows;
}

// ─── PROCESS HIBOUTIK ───
function processHib(rows){
 // Fusionner avec données cumulatives en mémoire
 var cumul={};
 try{ var ex=localStorage.getItem('hygie_hib_cumul'); if(ex) cumul=JSON.parse(ex); }catch(e){}

 // Intégrer les nouvelles lignes dans le cumul en mémoire
 var now=new Date();
 var moisCourant=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
 rows.forEach(function(r){
 var mois=(r['Date']||'').slice(0,7);
 if(!mois) return;
 if(!cumul[mois]) cumul[mois]=[];
 if(mois===moisCourant){
 // Mois courant : toujours remplacer avec les données fraîches
 cumul[mois]=rows.filter(function(r2){return (r2['Date']||'').indexOf(mois)===0;});
 return; // sortir du forEach après avoir traité tout le mois courant
 } else {
 var ids={};
 cumul[mois].forEach(function(r2){ ids[r2['ID']]=true; });
 if(!ids[r['ID']]) cumul[mois].push(r);
 }
 });

 // Aplatir le cumul en tableau pour hibRows
 hibRows=[];
 Object.keys(cumul).forEach(function(m){ hibRows=hibRows.concat(cumul[m]); });

 moisActif=moisCourant;
 var nomMois=now.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
 var moisRows=hibRows.filter(function(r){return (r['Date']||'').indexOf(moisActif)===0;});
 var ca=moisRows.reduce(function(a,r){return a+parseFloat(r['CA TTC']||0);},0);
 var nb=moisRows.length;
 var panier=nb?ca/nb:0;

 document.getElementById('lbl-ca').textContent='Boutique '+nomMois;
 document.getElementById('ttl-ca').textContent='Boutique '+nomMois;
 document.getElementById('n-ca').textContent=fmtE(ca);
 document.getElementById('s-ca').textContent=nb+' transactions · panier moy. '+fmtE(panier);
 document.getElementById('b-ca').textContent=fmtE(ca);

 renderCA(moisActif);
}

// ─── SAUVEGARDE / RESTAURATION ───
function sauvegarder(cle,donnees,nomFichier){
 try{
 if(cle==='hib'){
 // CA : fusion cumulative les mois passés ne sont jamais écrasés
 var existing={};
 try{ var ex=localStorage.getItem('hygie_hib_cumul'); if(ex) existing=JSON.parse(ex); }catch(e){}
 // Indexer les nouvelles données par mois
 donnees.forEach(function(r){
 var mois=(r['Date']||'').slice(0,7);
 if(!mois) return;
 // Ne pas écraser les mois déjà en mémoire sauf si c'est le mois en cours
 var now=new Date();
 var moisCourant=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
 if(!existing[mois] || mois===moisCourant){
 if(!existing[mois]) existing[mois]=[];
 // Ajouter seulement les lignes pas encore présentes (par ID)
 var idsExistants={};
 existing[mois].forEach(function(r2){ idsExistants[r2['ID']]=true; });
 if(!idsExistants[r['ID']]) existing[mois].push(r);
 }
 });
 localStorage.setItem('hygie_hib_cumul', JSON.stringify(existing));
 } else {
 localStorage.setItem('hygie_'+cle, JSON.stringify(donnees));
 }
 localStorage.setItem('hygie_'+cle+'_nom', nomFichier);
 localStorage.setItem('hygie_'+cle+'_date', new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}));
 }catch(e){ console.log('localStorage error',e); }
}

function sauvegarderSnapshotMembres(count, nouveaux, retention){
 try{
 var now=new Date();
 var moisCle=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
 var snapshots={};
 try{ var ex=localStorage.getItem('hygie_snapshots'); if(ex) snapshots=JSON.parse(ex); }catch(e){}
 snapshots[moisCle]=count;
 localStorage.setItem('hygie_snapshots', JSON.stringify(snapshots));
 // Sauvegarder aussi nouveaux et rétention
 var snapNouveaux={};
 try{ var exn=localStorage.getItem('hygie_snap_nouveaux'); if(exn) snapNouveaux=JSON.parse(exn); }catch(e){}
 snapNouveaux[moisCle]=nouveaux;
 localStorage.setItem('hygie_snap_nouveaux', JSON.stringify(snapNouveaux));
 var snapRetention={};
 try{ var exr=localStorage.getItem('hygie_snap_retention'); if(exr) snapRetention=JSON.parse(exr); }catch(e){}
 snapRetention[moisCle]=retention;
 localStorage.setItem('hygie_snap_retention', JSON.stringify(snapRetention));
 console.log('Snapshot sauvegardé:', moisCle, 'actifs:'+count, 'nouveaux:'+nouveaux, 'retention:'+retention+'%');
 }catch(e){ console.log('Erreur snapshot:', e); }
}

function restaurer(){
 try{
 var resaRaw=localStorage.getItem('hygie_resa');
 if(resaRaw){
 processResa(JSON.parse(resaRaw));
 majLabelResa(localStorage.getItem('hygie_resa_nom'), localStorage.getItem('hygie_resa_date'));
 }
 }catch(e){}
 try{
 // Restaurer CA depuis le cumul
 var cumul=localStorage.getItem('hygie_hib_cumul');
 if(cumul){
 var rows=[];
 var obj=JSON.parse(cumul);
 Object.keys(obj).forEach(function(m){ rows=rows.concat(obj[m]); });
 if(rows.length){
 hibRows=rows;
 var now=new Date();
 moisActif=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
 var nomMois=now.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
 var moisRows=hibRows.filter(function(r){return (r['Date']||'').indexOf(moisActif)===0;});
 var ca=moisRows.reduce(function(a,r){return a+parseFloat(r['CA TTC']||0);},0);
 var nb=moisRows.length;
 var panier=nb?ca/nb:0;
 document.getElementById('lbl-ca').textContent='Boutique '+nomMois;
 document.getElementById('ttl-ca').textContent='Boutique '+nomMois;
 document.getElementById('n-ca').textContent=fmtE(ca);
 document.getElementById('s-ca').textContent=nb+' transactions · panier moy. '+fmtE(panier);
 document.getElementById('b-ca').textContent=fmtE(ca);
 renderCA(moisActif);
 majLabelHib(localStorage.getItem('hygie_hib_nom'), localStorage.getItem('hygie_hib_date'));
 }
 }
 }catch(e){}
 try{
 // Version v2 : parser multi-format. Invalider les caches v1.
 var cachVer=localStorage.getItem('hygie_cours_ver');
 if(cachVer!=='v2'){
 localStorage.removeItem('hygie_cours_cumul');
 localStorage.setItem('hygie_cours_ver','v2');
 }
 var coursCumul=localStorage.getItem('hygie_cours_cumul');
 if(coursCumul){
 var cumul=JSON.parse(coursCumul);
 rempliRows=[];
 Object.keys(cumul).forEach(function(m){ rempliRows=rempliRows.concat(cumul[m]); });
 if(rempliRows.length){
 updateTuileCours();
 renderRempli();
 var lbl=localStorage.getItem('hygie_cours_nom');
 var dat=localStorage.getItem('hygie_cours_date');
 if(lbl) majLabelCours(lbl,dat);
 }
 }
 }catch(e){}
}

// ─── SYNC ───
function exporterSync(){
 var KEYS=['hygie_snapshots','hygie_snap_nouveaux','hygie_snap_retention',
 'hygie_hib_cumul','hygie_cours_cumul','hygie_cours_ver',
 'hygie_resa_nom','hygie_resa_date','hygie_hib_nom','hygie_hib_date',
 'hygie_cours_nom','hygie_cours_date'];
 for(var i=0;i<localStorage.length;i++){
 var k=localStorage.key(i);
 if(k&&k.indexOf('hygie_suppr_')===0) KEYS.push(k);
 }
 var data={};
 KEYS.forEach(function(k){ var v=localStorage.getItem(k); if(v) data[k]=v; });
 var json=JSON.stringify(data);
 var b64=btoa(unescape(encodeURIComponent(json)));
 var code='HYGIE-'+b64;

 var overlay=document.createElement('div');
 overlay.style='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9998;display:flex;align-items:center;justify-content:center;padding:20px';
 var box=document.createElement('div');
 box.style='background:var(--sur);border-radius:16px;padding:20px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:12px';
 var titre=document.createElement('div');
 titre.textContent='Code de sync';
 titre.style='font-size:15px;font-weight:700;color:var(--t)';
 var sub=document.createElement('div');
 sub.textContent="Copie ce code sur l'autre appareil";
 sub.style='font-size:12px;color:var(--t3);margin-top:-6px';
 var ta=document.createElement('textarea');
 ta.value=code;
 ta.readOnly=true;
 ta.style='width:100%;height:100px;padding:10px;border-radius:10px;border:.5px solid var(--bd2);background:var(--s2);color:var(--t);font-size:11px;resize:none;font-family:monospace';
 var rowBtns=document.createElement('div');
 rowBtns.style='display:flex;gap:8px';
 var btnCopy=document.createElement('button');
 btnCopy.textContent='Copier';
 btnCopy.style='flex:1;padding:10px;border-radius:10px;border:none;background:var(--t);color:var(--bg);cursor:pointer;font-size:13px;font-weight:700';
 var btnFermer=document.createElement('button');
 btnFermer.textContent='Fermer';
 btnFermer.style='flex:1;padding:10px;border-radius:10px;border:.5px solid var(--bd2);background:transparent;color:var(--t2);cursor:pointer;font-size:13px';
 rowBtns.appendChild(btnCopy);
 rowBtns.appendChild(btnFermer);
 box.appendChild(titre);
 box.appendChild(sub);
 box.appendChild(ta);
 box.appendChild(rowBtns);
 overlay.appendChild(box);
 document.body.appendChild(overlay);
 ta.focus(); ta.select();

 function fermer(){ document.body.removeChild(overlay); }
 btnFermer.onclick=fermer;
 btnCopy.onclick=function(){
 ta.select();
 try{
 navigator.clipboard.writeText(ta.value).then(function(){
 btnCopy.textContent=' Copié !';
 btnCopy.style.background='var(--green)';
 setTimeout(fermer, 1000);
 });
 }catch(e){
 document.execCommand('copy');
 btnCopy.textContent=' Copié !';
 btnCopy.style.background='var(--green)';
 setTimeout(fermer, 1000);
 }
 };
}

function importerSync(){
 // Interface maison prompt() bloqué dans certains contextes
 var overlay=document.createElement('div');
 overlay.style='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9998;display:flex;align-items:center;justify-content:center;padding:20px';
 var box=document.createElement('div');
 box.style='background:var(--sur);border-radius:16px;padding:20px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:12px';
 var titre=document.createElement('div');
 titre.textContent='Colle le code de sync';
 titre.style='font-size:15px;font-weight:700;color:var(--t)';
 var ta=document.createElement('textarea');
 ta.placeholder='HYGIE-...';
 ta.style='width:100%;height:100px;padding:10px;border-radius:10px;border:.5px solid var(--bd2);background:var(--s2);color:var(--t);font-size:12px;resize:none;font-family:monospace';
 var rowBtns=document.createElement('div');
 rowBtns.style='display:flex;gap:8px';
 var btnAnn=document.createElement('button');
 btnAnn.textContent='Annuler';
 btnAnn.style='flex:1;padding:10px;border-radius:10px;border:.5px solid var(--bd2);background:transparent;color:var(--t2);cursor:pointer;font-size:13px';
 var btnOk=document.createElement('button');
 btnOk.textContent='Importer';
 btnOk.style='flex:1;padding:10px;border-radius:10px;border:none;background:var(--t);color:var(--bg);cursor:pointer;font-size:13px;font-weight:700';
 rowBtns.appendChild(btnAnn);
 rowBtns.appendChild(btnOk);
 box.appendChild(titre);
 box.appendChild(ta);
 box.appendChild(rowBtns);
 overlay.appendChild(box);
 document.body.appendChild(overlay);
 ta.focus();

 function fermer(){ document.body.removeChild(overlay); }
 btnAnn.onclick=fermer;

 btnOk.onclick=function(){
 var code=ta.value.trim();
 if(!code||code.indexOf('HYGIE-')!==0){
 ta.style.borderColor='var(--red)';
 ta.placeholder='Code invalide commence par HYGIE-';
 return;
 }
 try{
 var b64=code.slice(6);
 var json=decodeURIComponent(escape(atob(b64)));
 var data=JSON.parse(json);
 Object.keys(data).forEach(function(k){ localStorage.setItem(k,data[k]); });
 fermer();
 location.reload();
 }catch(e){
 ta.style.borderColor='var(--red)';
 ta.value='';
 ta.placeholder='Erreur: '+e.message;
 }
 };
}
